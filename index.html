<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wellopia — The Medicine War</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,200..600,0..100&display=swap" rel="stylesheet" />
<style>
  :root {
    --yellow: #FFC72C;
    --green: #0F3D2E;
    --green-soft: #2A6B52;
    --cream: #FFF6DA;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--green);
    color: var(--green);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .deck {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    background: var(--yellow);
    display: flex;
    align-items: center;
    padding: 14vh 11vw;
    opacity: 0;
    transform: scale(1.03);
    pointer-events: none;
    transition: opacity 0.8s cubic-bezier(0.22, 0.9, 0.25, 1),
                transform 1s cubic-bezier(0.22, 0.9, 0.25, 1);
    will-change: opacity, transform;
  }

  .slide.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
    z-index: 2;
  }

  .slide.invert {
    background: var(--green);
  }
  .slide.invert .phrase { color: var(--cream); }

  .phrase {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 50, "wght" 320;
    font-weight: 320;
    font-size: clamp(3rem, 8.6vw, 9rem);
    line-height: 0.96;
    letter-spacing: -0.028em;
    color: var(--green);
    max-width: 18ch;
  }

  .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(36px);
    will-change: opacity, transform;
  }
  .slide.active .word {
    animation: rise 1s cubic-bezier(0.2, 0.9, 0.25, 1) forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Period emphasis */
  .phrase .punct {
    color: var(--green-soft);
  }
  .slide.invert .phrase .punct {
    color: var(--yellow);
    opacity: 0.85;
  }

  /* Brand lockup — bottom left */
  .lockup {
    position: fixed;
    bottom: 4.4vh;
    left: 4.4vw;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: color 0.6s;
  }
  .lockup .name {
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--green);
  }
  .lockup .tag {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 0.7rem;
    color: var(--green-soft);
  }
  body.inv .lockup .name { color: var(--yellow); }
  body.inv .lockup .tag { color: var(--cream); opacity: 0.7; }

  /* Counter — bottom right */
  .counter {
    position: fixed;
    bottom: 4.4vh;
    right: 4.4vw;
    z-index: 10;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.34em;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: color 0.6s;
  }
  .counter .now {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 0;
  }
  .counter .total {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: 0;
    opacity: 0.5;
  }
  .counter .bar {
    width: 60px;
    height: 1px;
    background: currentColor;
    opacity: 0.4;
  }
  body.inv .counter { color: var(--yellow); }

  /* Hint — auto-hides */
  .hint {
    position: fixed;
    top: 4.4vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--green-soft);
    text-transform: uppercase;
    opacity: 0.5;
    transition: opacity 0.6s, color 0.6s;
  }
  .hint.hide { opacity: 0; }
  body.inv .hint { color: var(--cream); opacity: 0.4; }
  body.inv .hint.hide { opacity: 0; }

  /* Background ambient — extremely subtle breathing */
  .slide::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at 30% 40%,
      rgba(255, 255, 255, 0.18),
      transparent 60%
    );
    opacity: 0;
    transition: opacity 1.2s;
    pointer-events: none;
  }
  .slide.active::before {
    opacity: 1;
    animation: breathe 9s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    from { transform: translate(-2%, -1%) scale(1); }
    to   { transform: translate(2%, 1%) scale(1.05); }
  }
  .slide.invert::before {
    background: radial-gradient(
      ellipse at 30% 40%,
      rgba(255, 199, 44, 0.07),
      transparent 60%
    );
  }

  /* Print */
  @media print {
    html, body { overflow: visible; height: auto; background: var(--yellow); }
    .deck { height: auto; }
    .slide {
      opacity: 1 !important;
      transform: none !important;
      position: relative !important;
      page-break-after: always;
      height: 100vh;
    }
    .slide .word { opacity: 1 !important; transform: none !important; }
    .hint { display: none; }
  }

  @media (max-width: 700px) {
    .slide { padding: 16vh 7vw; }
    .lockup { left: 6vw; }
    .counter { right: 6vw; }
  }
</style>
</head>
<body>
<div class="deck">
  <section class="slide active" data-i="0">
    <h1 class="phrase split">Kids ask for it.</h1>
  </section>

  <section class="slide" data-i="1">
    <h1 class="phrase split">The syrup battle is universal.</h1>
  </section>

  <section class="slide invert" data-i="2">
    <h1 class="phrase split">Day 3. Operation: Cough Syrup.</h1>
  </section>

  <section class="slide" data-i="3">
    <h1 class="phrase split">We reversed the war.</h1>
  </section>

  <section class="slide" data-i="4">
    <h1 class="phrase split">We sold the moment a parent stops fighting.</h1>
  </section>
</div>

<div class="lockup">
  <div class="name">Wellopia</div>
  <div class="tag">Clean &amp; Joyful Care</div>
</div>

<div class="counter">
  <span class="bar"></span>
  <span class="now" id="now">01</span>
  <span class="total" id="total">05</span>
</div>

<div class="hint" id="hint">← →</div>

<script>
  // Word-stagger split — keep punctuation visually distinct
  document.querySelectorAll('.split').forEach(el => {
    const words = el.textContent.trim().split(/\s+/);
    el.innerHTML = words.map((w, i) => {
      const delay = (0.25 + i * 0.11).toFixed(2);
      // wrap trailing punctuation in a span for tonal color
      const m = w.match(/^(.*?)([.,:;!?])?$/);
      const core = m[1];
      const punct = m[2] ? `<span class="punct">${m[2]}</span>` : '';
      return `<span class="word" style="animation-delay:${delay}s">${core}${punct}</span>`;
    }).join(' ');
  });

  const slides = document.querySelectorAll('.slide');
  const now = document.getElementById('now');
  const total = document.getElementById('total');
  const hint = document.getElementById('hint');
  let current = 0;

  const pad = n => n.toString().padStart(2, '0');
  total.textContent = pad(slides.length);

  function update() {
    now.textContent = pad(current + 1);
    document.body.classList.toggle('inv', slides[current].classList.contains('invert'));
  }

  function retrigger(slide) {
    slide.querySelectorAll('.word').forEach(w => {
      const clone = w.cloneNode(true);
      w.parentNode.replaceChild(clone, w);
    });
  }

  function go(idx) {
    if (idx < 0 || idx >= slides.length || idx === current) return;
    slides[current].classList.remove('active');
    current = idx;
    retrigger(slides[current]);
    requestAnimationFrame(() => slides[current].classList.add('active'));
    update();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault();
      go(current + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      go(current - 1);
    } else if (e.key === 'Home') {
      go(0);
    } else if (e.key === 'End') {
      go(slides.length - 1);
    }
  });

  // Click anywhere advances
  document.addEventListener('click', (e) => {
    if (e.target.closest('.lockup, .counter, .hint, a, button')) return;
    go(current + 1);
  });

  // Touch swipe
  let tx = 0;
  document.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - tx;
    if (Math.abs(dx) > 50) go(current + (dx < 0 ? 1 : -1));
  }, { passive: true });

  // Auto-hide hint after 3.5s of no interaction
  let hintTimer;
  function showHint() {
    hint.classList.remove('hide');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.classList.add('hide'), 3500);
  }
  showHint();
  ['mousemove', 'keydown', 'touchstart'].forEach(ev =>
    document.addEventListener(ev, showHint, { passive: true })
  );

  update();
</script>
</body>
</html>
